<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="format-detection" content="telephone=no">
    <title>儿童积分管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px 15px;
            color: #333;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            font-size: 24px;
            color: #667eea;
            text-align: center;
            margin-bottom: 10px;
        }

        .header p {
            text-align: center;
            color: #666;
            font-size: 14px;
        }

        .user-info {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 15px 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-detail {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
        }

        .user-name {
            font-weight: bold;
            color: #333;
        }

        .logout-btn {
            background: #f44336;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 8px 16px;
            font-size: 14px;
            cursor: pointer;
        }

        .add-kid-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            transition: transform 0.2s;
        }

        .add-kid-btn:active {
            transform: scale(0.98);
        }

        .kid-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .kid-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .kid-name {
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }

        .kid-points {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 18px;
        }

        .kid-actions {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .action-btn {
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .action-btn:active {
            transform: scale(0.95);
        }

        .add-points {
            background: #4CAF50;
            color: white;
        }

        .subtract-points {
            background: #ff9800;
            color: white;
        }

        .exchange-points {
            background: #2196F3;
            color: white;
            grid-column: span 2;
        }

        .history-btn {
            background: #9C27B0;
            color: white;
            grid-column: span 2;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: flex-end;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 20px 20px 0 0;
            padding: 25px;
            width: 100%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 20px;
            font-weight: bold;
        }

        .close-btn {
            background: #f44336;
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            font-size: 20px;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
        }

        .form-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-secondary {
            background: #ddd;
            color: #333;
        }

        .history-list {
            list-style: none;
        }

        .history-item {
            padding: 12px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .history-info {
            flex: 1;
        }

        .history-action {
            font-weight: bold;
            color: #333;
        }

        .history-reason {
            color: #666;
            font-size: 14px;
            margin-top: 4px;
        }

        .history-time {
            color: #999;
            font-size: 12px;
        }

        .history-points {
            font-weight: bold;
            font-size: 18px;
            margin-left: 10px;
        }

        .history-points.add {
            color: #4CAF50;
        }

        .history-points.subtract {
            color: #ff9800;
        }

        .history-points.exchange {
            color: #2196F3;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #fff;
        }

        .empty-state-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .empty-state-text {
            font-size: 16px;
        }

        .quick-points {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .quick-point-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #f0f0f0;
            font-size: 14px;
            cursor: pointer;
        }

        .quick-point-btn:active {
            background: #e0e0e0;
        }

        .parent-name {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }

        .loading {
            text-align: center;
            padding: 40px 20px;
            color: white;
            font-size: 16px;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 30px;
            margin-top: 50px;
        }

        .login-title {
            font-size: 24px;
            color: #667eea;
            text-align: center;
            margin-bottom: 30px;
            font-weight: bold;
        }

        .login-type-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .login-type-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #667eea;
            border-radius: 10px;
            background: white;
            color: #667eea;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        .login-type-btn.active {
            background: #667eea;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <!-- 登录界面 -->
        <div id="loginSection" style="display: none;">
            <div class="login-container">
                <div class="login-title">🎯 儿童积分管理系统</div>
                <p style="text-align: center; color: #666; margin-bottom: 30px; font-size: 14px;">记录孩子的成长,奖励每一个进步</p>

                <div style="text-align: center; margin-bottom: 20px;">
                    <div style="font-size: 60px; margin-bottom: 10px;">👨‍👩‍👧</div>
                    <p style="color: #666; font-size: 14px; margin-bottom: 20px;">输入昵称即可开始使用,数据自动同步到云端</p>
                </div>

                <div class="form-group">
                    <label class="form-label">您的昵称</label>
                    <input type="text" class="form-input" id="nicknameInput" placeholder="请输入昵称(用于区分不同用户的数据)">
                </div>

                <div class="btn-group">
                    <button class="btn btn-primary" style="font-size: 18px; padding: 15px;" onclick="anonymousLogin()">
                        开始使用
                    </button>
                </div>
                <p style="text-align: center; color: #999; margin-top: 15px; font-size: 12px;">
                    数据将匿名存储到云端,请记住您的昵称以便下次访问
                </p>
            </div>
        </div>

        <!-- 主应用界面 -->
        <div id="mainSection" style="display: none;">
            <div class="header">
                <h1>🎯 儿童积分管理</h1>
                <p>记录孩子的成长,奖励每一个进步</p>
            </div>

            <div class="user-info">
                <div class="user-detail">
                    <div class="user-avatar" id="userAvatar">A</div>
                    <div>
                        <div class="user-name" id="userName">家长</div>
                        <div style="font-size: 12px; color: #999;">昵称: <span id="displayUsername">-</span></div>
                    </div>
                </div>
                <button class="logout-btn" onclick="logout()">退出</button>
            </div>

            <button class="add-kid-btn" onclick="openAddKidModal()">➕ 添加小朋友</button>

            <div id="kidsList">
                <!-- 小朋友列表将在这里渲染 -->
            </div>

            <div class="loading" id="loading">
                加载中...
            </div>

            <div class="empty-state" id="emptyState" style="display: none;">
                <div class="empty-state-icon">👶</div>
                <div class="empty-state-text">还没有添加小朋友哦~</div>
            </div>
        </div>
    </div>

    <!-- 添加小朋友弹窗 -->
    <div class="modal" id="addKidModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">添加小朋友</div>
                <button class="close-btn" onclick="closeModal('addKidModal')">×</button>
            </div>
            <div class="form-group">
                <label class="form-label">小朋友名字</label>
                <input type="text" class="form-input" id="kidName" placeholder="请输入小朋友的名字">
            </div>
            <div class="form-group">
                <label class="form-label">初始积分</label>
                <input type="number" class="form-input" id="initialPoints" value="0" min="0">
            </div>
            <div class="btn-group">
                <button class="btn btn-secondary" onclick="closeModal('addKidModal')">取消</button>
                <button class="btn btn-primary" onclick="addKid()">添加</button>
            </div>
        </div>
    </div>

    <!-- 积分操作弹窗 -->
    <div class="modal" id="pointsModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="pointsModalTitle">积分操作</div>
                <button class="close-btn" onclick="closeModal('pointsModal')">×</button>
            </div>
            <div class="form-group">
                <label class="form-label">家长姓名</label>
                <input type="text" class="form-input" id="parentName" placeholder="请输入您的姓名" value="">
            </div>
            <div class="form-group">
                <label class="form-label">积分数量</label>
                <input type="number" class="form-input" id="pointsAmount" value="1" min="1">
            </div>
            <div class="quick-points" id="quickPointsBtns">
                <!-- 快捷积分按钮 -->
            </div>
            <div class="form-group">
                <label class="form-label">原因</label>
                <input type="text" class="form-input" id="pointsReason" placeholder="请输入原因（选填）">
            </div>
            <div class="btn-group">
                <button class="btn btn-secondary" onclick="closeModal('pointsModal')">取消</button>
                <button class="btn btn-primary" id="pointsConfirmBtn">确认</button>
            </div>
        </div>
    </div>

    <!-- 历史记录弹窗 -->
    <div class="modal" id="historyModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">历史记录</div>
                <button class="close-btn" onclick="closeModal('historyModal')">×</button>
            </div>
            <ul class="history-list" id="historyList">
                <!-- 历史记录将在这里渲染 -->
            </ul>
        </div>
    </div>

        <script src="https://cdn.jsdelivr.net/npm/@cloudbase/js-sdk@1.7.2/browser/cloudbase.full.js"></script>
    <script>
        // CloudBase 配置
        const app = cloudbase.init({
            env: 'ai-native-4g0rtz9rbc334032'
        });

        const auth = app.auth({ persistence: 'local' });
        const db = app.database();
        let currentUser = null;
        let currentKidId = null;
        let currentAction = null;

        // 初始化
        async function init() {
            console.log('应用初始化...');
            try {
                const loginState = await auth.getLoginState();
                console.log('登录状态:', loginState);
                
                if (loginState && loginState.user) {
                    currentUser = loginState.user;
                    console.log('已登录,用户ID:', currentUser.uid);

                    // 从localStorage读取保存的昵称
                    const savedNickname = localStorage.getItem('user_nickname_' + currentUser.uid);
                    if (savedNickname) {
                        currentUser.nickname = savedNickname;
                    }

                    // 确保有昵称
                    currentUser.user_metadata = currentUser.user_metadata || {};
                    if (!currentUser.user_metadata.nickname) {
                        if (currentUser.nickname) {
                            currentUser.user_metadata.nickname = currentUser.nickname;
                        } else {
                            currentUser.user_metadata.nickname = '家长';
                        }
                    }

                    showMain();
                    loadKids();
                } else {
                    console.log('未登录，显示登录界面');
                    showLogin();
                }
            } catch (err) {
                console.error('初始化异常:', err);
                showLogin();
            }
        }

        // 匿名登录
        async function anonymousLogin() {
            const nickname = document.getElementById('nicknameInput').value.trim();

            if (!nickname) {
                alert('请输入昵称');
                return;
            }

            try {
                console.log('匿名登录,昵称:', nickname);

                // 先检查是否已有登录状态
                const loginState = await auth.getLoginState();
                if (loginState && loginState.user) {
                    currentUser = loginState.user;
                    console.log('已有登录,用户ID:', currentUser.uid);
                } else {
                    // 进行匿名登录
                    const result = await auth.anonymousAuthProvider().signIn();
                    console.log('匿名登录结果:', result);

                    if (result.code) {
                        alert('登录失败: ' + result.message);
                        return;
                    }

                    currentUser = result.user;
                    console.log('匿名登录成功,用户ID:', currentUser.uid);
                }

                // 设置昵称
                currentUser.user_metadata = currentUser.user_metadata || {};
                currentUser.user_metadata.nickname = nickname;

                // 保存昵称到localStorage
                localStorage.setItem('user_nickname_' + currentUser.uid, nickname);

                console.log('登录成功,用户ID:', currentUser.uid, '昵称:', nickname);

                showMain();
                loadKids();
            } catch (err) {
                console.error('登录异常:', err);
                alert('登录失败: ' + err.message);
            }
        }

        // 匿名登录
        // 显示登录界面
        function showLogin() {
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('mainSection').style.display = 'none';
        }

        // 显示主界面
        function showMain() {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('mainSection').style.display = 'block';

            // 更新用户信息
            const nickname = currentUser.user_metadata?.nickname || '家长';
            document.getElementById('userName').textContent = nickname;
            document.getElementById('userAvatar').textContent = nickname.charAt(0);
            document.getElementById('displayUsername').textContent = nickname;
            document.getElementById('parentName').value = nickname;
        }

        // 退出登录
        async function logout() {
            if (!confirm('确定要退出登录吗？')) return;

            const result = await auth.signOut();
            if (result.code) {
                alert('退出失败: ' + result.message);
                return;
            }

            currentUser = null;
            showLogin();
        }

        // 加载小朋友列表
        async function loadKids() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('kidsList').innerHTML = '';
            document.getElementById('emptyState').style.display = 'none';

            try {
                // 优先使用昵称作为标识，否则使用uid
                const parentId = currentUser.nickname || currentUser.uid;
                console.log('开始查询数据库，parentId:', parentId);
                
                const result = await db.collection('kids')
                    .where({ parentId: parentId })
                    .orderBy('createdAt', 'desc')
                    .get();

                console.log('数据库查询结果:', result);

                document.getElementById('loading').style.display = 'none';

                if (result.code) {
                    console.error('加载失败 - code:', result.code, 'message:', result.message);
                    alert('加载失败: ' + result.message);
                    return;
                }

                if (!result.data || result.data.length === 0) {
                    document.getElementById('emptyState').style.display = 'block';
                    return;
                }

                renderKids(result.data);
            } catch (err) {
                document.getElementById('loading').style.display = 'none';
                console.error('加载异常:', err);
                alert('加载失败: ' + err.message);
            }
        }

        // 渲染小朋友列表
        function renderKids(kids) {
            const kidsList = document.getElementById('kidsList');

            kidsList.innerHTML = kids.map(kid => `
                <div class="kid-card">
                    <div class="kid-header">
                        <div>
                            <div class="kid-name">${escapeHtml(kid.name)}</div>
                            <div class="parent-name">当前积分</div>
                        </div>
                        <div class="kid-points">${kid.totalPoints}分</div>
                    </div>
                    <div class="kid-actions">
                        <button class="action-btn add-points" onclick="openPointsModal('${kid._id}', 'add')">➕ 加分</button>
                        <button class="action-btn subtract-points" onclick="openPointsModal('${kid._id}', 'subtract')">➖ 减分</button>
                        <button class="action-btn exchange-points" onclick="openPointsModal('${kid._id}', 'exchange')">🎁 兑换积分</button>
                        <button class="action-btn history-btn" onclick="openHistoryModal('${kid._id}')">📜 历史记录</button>
                    </div>
                </div>
            `).join('');
        }

        // 打开添加小朋友弹窗
        function openAddKidModal() {
            document.getElementById('kidName').value = '';
            document.getElementById('initialPoints').value = '0';
            document.getElementById('addKidModal').classList.add('active');
        }

        // 添加小朋友
        async function addKid() {
            const name = document.getElementById('kidName').value.trim();
            const initialPoints = parseInt(document.getElementById('initialPoints').value) || 0;

            if (!name) {
                alert('请输入小朋友的名字');
                return;
            }

            // 优先使用昵称作为标识
            const parentId = currentUser.nickname || currentUser.uid;
            console.log('当前用户:', currentUser);
            console.log('使用的parentId:', parentId);
            
            const kid = {
                name: name,
                totalPoints: initialPoints,
                parentId: parentId,
                createdAt: new Date(),
                history: initialPoints > 0 ? [{
                    type: 'add',
                    points: initialPoints,
                    reason: '初始积分',
                    parentName: currentUser.user_metadata?.nickname || '家长',
                    time: new Date().toLocaleString('zh-CN')
                }] : []
            };

            try {
                console.log('开始添加数据:', kid);
                console.log('db对象:', db);
                console.log('db.collection:', db.collection);
                
                const result = await db.collection('kids').add(kid);
                console.log('添加结果:', result);
                console.log('添加结果code:', result.code);
                console.log('添加结果message:', result.message);
                console.log('添加结果id:', result.id);

                if (result.code) {
                    alert('添加失败: ' + result.message);
                    return;
                }

                closeModal('addKidModal');
                loadKids();
            } catch (err) {
                console.error('添加失败:', err);
                console.error('错误详情:', JSON.stringify(err));
                alert('添加失败: ' + err.message);
            }
        }

        // 打开积分操作弹窗
        function openPointsModal(kidId, action) {
            currentKidId = kidId;
            currentAction = action;

            const kidName = document.querySelector(`button[onclick*="'${kidId}'"]`).closest('.kid-card').querySelector('.kid-name').textContent;

            const titles = {
                add: `给 ${kidName} 加分`,
                subtract: `给 ${kidName} 减分`,
                exchange: `用 ${kidName} 的积分兑换`
            };

            document.getElementById('pointsModalTitle').textContent = titles[action];
            document.getElementById('pointsAmount').value = 1;
            document.getElementById('pointsReason').value = '';

            // 渲染快捷积分按钮
            const quickPointsBtns = document.getElementById('quickPointsBtns');
            const quickPoints = action === 'exchange' ? [10, 20, 50, 100] : [1, 5, 10, 20];
            quickPointsBtns.innerHTML = quickPoints.map(p => `
                <button class="quick-point-btn" onclick="setPointsAmount(${p})">${p}分</button>
            `).join('');

            document.getElementById('pointsConfirmBtn').onclick = () => confirmPoints();
            document.getElementById('pointsModal').classList.add('active');
        }

        // 设置积分数量
        function setPointsAmount(amount) {
            document.getElementById('pointsAmount').value = amount;
        }

        // 确认积分操作
        async function confirmPoints() {
            const kidId = currentKidId;
            const parentName = document.getElementById('parentName').value.trim() || currentUser.user_metadata?.nickname || '家长';
            const points = parseInt(document.getElementById('pointsAmount').value) || 0;
            const reason = document.getElementById('pointsReason').value.trim();

            if (points <= 0) {
                alert('请输入有效的积分数量');
                return;
            }

            // 先查询当前积分
            console.log('查询小朋友数据，ID:', kidId);
            const queryResult = await db.collection('kids').doc(kidId).get();
            console.log('查询结果:', queryResult);
            
            if (queryResult.code || !queryResult.data || queryResult.data.length === 0) {
                alert('查询失败: ' + (queryResult.message || '未知错误'));
                return;
            }

            const kid = queryResult.data[0];

            if ((currentAction === 'subtract' || currentAction === 'exchange') && points > kid.totalPoints) {
                alert('积分不足');
                return;
            }

            let pointChange = 0;
            let type = '';
            let actionText = '';

            if (currentAction === 'add') {
                pointChange = points;
                type = 'add';
                actionText = '加分';
            } else if (currentAction === 'subtract') {
                pointChange = -points;
                type = 'subtract';
                actionText = '减分';
            } else if (currentAction === 'exchange') {
                pointChange = -points;
                type = 'exchange';
                actionText = '兑换';
            }

            const newTotalPoints = kid.totalPoints + pointChange;
            const newHistory = [...(kid.history || []), {
                type: type,
                points: points,
                reason: reason || actionText,
                parentName: parentName,
                time: new Date().toLocaleString('zh-CN')
            }];

            try {
                console.log('更新数据:', { totalPoints: newTotalPoints, historyLength: newHistory.length });
                const result = await db.collection('kids').doc(kidId).update({
                    totalPoints: newTotalPoints,
                    history: newHistory
                });
                console.log('更新结果:', result);

                if (result.code) {
                    alert('操作失败: ' + result.message);
                    return;
                }

                closeModal('pointsModal');
                loadKids();

                const message = type === 'add'
                    ? `已给 ${kid.name} 加 ${points} 分!`
                    : `已${actionText} ${points} 分!`;
                alert(message);
            } catch (err) {
                console.error('操作失败:', err);
                alert('操作失败: ' + err.message);
            }
        }

        // 打开历史记录弹窗
        async function openHistoryModal(kidId) {
            const result = await db.collection('kids').doc(kidId).get();
            if (result.code || !result.data || result.data.length === 0) {
                alert('查询失败: ' + (result.message || '未知错误'));
                return;
            }

            const kid = result.data[0];
            const historyList = document.getElementById('historyList');

            if (!kid.history || kid.history.length === 0) {
                historyList.innerHTML = '<li style="text-align: center; padding: 20px; color: #999;">暂无历史记录</li>';
            } else {
                historyList.innerHTML = kid.history.map(record => {
                    const typeLabels = {
                        add: { text: '加分', className: 'add' },
                        subtract: { text: '减分', className: 'subtract' },
                        exchange: { text: '兑换', className: 'exchange' }
                    };
                    const typeInfo = typeLabels[record.type];
                    const pointSign = record.type === 'add' ? '+' : '-';

                    return `
                        <li class="history-item">
                            <div class="history-info">
                                <div class="history-action">${escapeHtml(record.parentName)} - ${typeInfo.text}</div>
                                <div class="history-reason">${escapeHtml(record.reason)}</div>
                                <div class="history-time">${record.time}</div>
                            </div>
                            <div class="history-points ${typeInfo.className}">${pointSign}${record.points}</div>
                        </li>
                    `;
                }).join('');
            }

            document.getElementById('historyModal').classList.add('active');
        }

        // 关闭弹窗
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        // 转义HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 点击遮罩层关闭弹窗
        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.classList.remove('active');
                }
            });
        });

        // 初始化
        init();
    </script>
</body>
</html>
