<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="format-detection" content="telephone=no">
    <title>儿童积分管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px 15px;
            color: #333;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            font-size: 24px;
            color: #667eea;
            text-align: center;
            margin-bottom: 10px;
        }

        .header p {
            text-align: center;
            color: #666;
            font-size: 14px;
        }

        .user-info {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 15px 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-detail {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
        }

        .user-name {
            font-weight: bold;
            color: #333;
        }

        .logout-btn {
            background: #f44336;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 8px 16px;
            font-size: 14px;
            cursor: pointer;
        }

        .user-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .action-btn-small {
            border: none;
            border-radius: 15px;
            padding: 6px 12px;
            font-size: 12px;
            cursor: pointer;
            color: white;
        }

        .action-btn-small.add-kid-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .action-btn-small.link-kid-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .kid-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .kid-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .kid-name {
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }

        .kid-points {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 18px;
        }

        .kid-actions {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 15px;
        }

        .kid-actions .action-btn:nth-child(4),
        .kid-actions .action-btn:nth-child(5) {
            grid-column: span 1;
        }

        .action-btn {
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .action-btn:active {
            transform: scale(0.95);
        }

        .add-points {
            background: #4CAF50;
            color: white;
        }

        .subtract-points {
            background: #ff9800;
            color: white;
        }

        .exchange-points {
            background: #2196F3;
            color: white;
            grid-column: span 2;
        }

        .history-btn {
            background: #9C27B0;
            color: white;
        }

        .delete-btn {
            background: #e74c3c;
            color: white;
        }

        .delete-btn:hover {
            background: #c0392b;
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: flex-end;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 20px 20px 0 0;
            padding: 25px;
            width: 100%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 20px;
            font-weight: bold;
        }

        .close-btn {
            background: #f44336;
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            font-size: 20px;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
        }

        .form-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-secondary {
            background: #ddd;
            color: #333;
        }

        .history-list {
            list-style: none;
        }

        .history-item {
            padding: 12px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .history-info {
            flex: 1;
        }

        .history-action {
            font-weight: bold;
            color: #333;
        }

        .history-reason {
            color: #666;
            font-size: 14px;
            margin-top: 4px;
        }

        .history-time {
            color: #999;
            font-size: 12px;
        }

        .history-points {
            font-weight: bold;
            font-size: 18px;
            margin-left: 10px;
        }

        .history-points.add {
            color: #4CAF50;
        }

        .history-points.subtract {
            color: #ff9800;
        }

        .history-points.exchange {
            color: #2196F3;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #fff;
        }

        .empty-state-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .empty-state-text {
            font-size: 16px;
        }

        /* Tab 导航样式 */
        .tab-nav {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            background: transparent;
            color: #666;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* 排行榜样式 */
        .ranking-list {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .ranking-item {
            display: flex;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #eee;
            gap: 15px;
        }

        .ranking-item:last-child {
            border-bottom: none;
        }

        .rank-badge {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            color: white;
        }

        .rank-badge.rank-1 {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
        }

        .rank-badge.rank-2 {
            background: linear-gradient(135deg, #C0C0C0 0%, #A0A0A0 100%);
        }

        .rank-badge.rank-3 {
            background: linear-gradient(135deg, #CD7F32 0%, #A0522D 100%);
        }

        .rank-badge.rank-other {
            background: #666;
        }

        .ranking-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 20px;
        }

        .ranking-info {
            flex: 1;
        }

        .ranking-name {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .ranking-points {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 6px 14px;
            border-radius: 16px;
            font-weight: bold;
            font-size: 18px;
        }

        .ranking-empty {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .ranking-empty-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .quick-points {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .quick-point-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #f0f0f0;
            font-size: 14px;
            cursor: pointer;
        }

        .quick-point-btn:active {
            background: #e0e0e0;
        }

        .parent-name {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }

        .loading {
            text-align: center;
            padding: 40px 20px;
            color: white;
            font-size: 16px;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 30px;
            margin-top: 50px;
        }

        .login-title {
            font-size: 24px;
            color: #667eea;
            text-align: center;
            margin-bottom: 30px;
            font-weight: bold;
        }

        .login-type-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .login-type-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #667eea;
            border-radius: 10px;
            background: white;
            color: #667eea;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        .login-type-btn.active {
            background: #667eea;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <!-- 登录界面 -->
        <div id="loginSection" style="display: none;">
            <div class="login-container">
                <div class="login-title">🎯 儿童积分管理系统</div>
                <p style="text-align: center; color: #666; margin-bottom: 30px; font-size: 14px;">记录孩子的成长,奖励每一个进步</p>

                <div style="text-align: center; margin-bottom: 20px;">
                    <div style="font-size: 60px; margin-bottom: 10px;">👨‍👩‍👧</div>
                    <p style="color: #666; font-size: 14px; margin-bottom: 20px;">输入昵称即可开始使用,数据自动同步到云端</p>
                </div>

                <div class="form-group">
                    <label class="form-label">您的昵称</label>
                    <input type="text" class="form-input" id="nicknameInput" placeholder="请输入昵称(用于区分不同用户的数据)">
                </div>

                <div class="btn-group">
                    <button class="btn btn-primary" style="font-size: 18px; padding: 15px;" onclick="anonymousLogin()">
                        开始使用
                    </button>
                </div>
                <p style="text-align: center; color: #999; margin-top: 15px; font-size: 12px;">
                    数据将匿名存储到云端,请记住您的昵称以便下次访问
                </p>
            </div>
        </div>

        <!-- 主应用界面 -->
        <div id="mainSection" style="display: none;">
            <div class="header">
                <h1>🎯 儿童积分管理</h1>
                <p>记录孩子的成长,奖励每一个进步</p>
            </div>

            <div class="user-info">
                <div class="user-detail">
                    <div class="user-avatar" id="userAvatar">A</div>
                    <div>
                        <div class="user-name" id="userName">家长</div>
                        <div style="font-size: 12px; color: #999;">昵称: <span id="displayUsername">-</span></div>
                    </div>
                </div>
                <div class="user-actions">
                    <button class="action-btn-small add-kid-btn" onclick="openAddKidModal()">➕ 添加</button>
                    <button class="action-btn-small link-kid-btn" onclick="openLinkKidModal()">🔗 关联</button>
                    <button class="logout-btn" onclick="logout()">退出</button>
                </div>
            </div>

            <!-- Tab 导航 -->
            <div class="tab-nav">
                <button class="tab-btn active" onclick="switchTab('kids')" id="tabKids">👶 我的小朋友</button>
                <button class="tab-btn" onclick="switchTab('ranking')" id="tabRanking">🏆 积分排名</button>
            </div>

            <!-- Tab 内容: 我的小朋友 -->
            <div id="kidsTabContent" class="tab-content active">
                <div id="kidsList">
                    <!-- 小朋友列表将在这里渲染 -->
                </div>

                <div class="loading" id="loading">
                    加载中...
                </div>

                <div class="empty-state" id="emptyState" style="display: none;">
                    <div class="empty-state-icon">👶</div>
                    <div class="empty-state-text">还没有添加小朋友哦~</div>
                </div>
            </div>

            <!-- Tab 内容: 积分排名 -->
            <div id="rankingTabContent" class="tab-content">
                <div class="ranking-list" id="rankingList">
                    <!-- 排名列表将在这里渲染 -->
                </div>

                <div class="ranking-empty" id="rankingEmpty" style="display: none;">
                    <div class="ranking-empty-icon">📊</div>
                    <div>暂无排名数据</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 添加小朋友弹窗 -->
    <div class="modal" id="addKidModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">添加小朋友</div>
                <button class="close-btn" onclick="closeModal('addKidModal')">×</button>
            </div>
            <div class="form-group">
                <label class="form-label">小朋友名字</label>
                <input type="text" class="form-input" id="kidName" placeholder="请输入小朋友的名字">
            </div>
            <div class="form-group">
                <label class="form-label">初始积分</label>
                <input type="number" class="form-input" id="initialPoints" value="0" min="0">
            </div>
            <div class="form-group">
                <label class="form-label">关联码 (6位数字)</label>
                <input type="text" class="form-input" id="kidCode" placeholder="用于让其他家长关联此小朋友" maxlength="6">
                <p style="font-size: 12px; color: #999; margin-top: 5px;">请记住此关联码，分享给其他家长</p>
            </div>
            <div class="btn-group">
                <button class="btn btn-secondary" onclick="closeModal('addKidModal')">取消</button>
                <button class="btn btn-primary" onclick="addKid()">添加</button>
            </div>
        </div>
    </div>

    <!-- 关联小朋友弹窗 -->
    <div class="modal" id="linkKidModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">关联小朋友</div>
                <button class="close-btn" onclick="closeModal('linkKidModal')">×</button>
            </div>
            <div class="form-group">
                <label class="form-label">请选择要关联的小朋友</label>
                <select class="form-input" id="linkKidSelect" onchange="onKidSelectChange()">
                    <option value="">-- 请选择 --</option>
                </select>
            </div>
            <div id="linkKidCodeSection" style="display: none;">
                <div class="form-group">
                    <label class="form-label">请输入 <span id="linkKidNameDisplay" style="font-weight: bold;"></span> 的关联码</label>
                    <input type="text" class="form-input" id="linkKidCode" placeholder="请输入6位关联码" maxlength="6">
                </div>
                <div class="btn-group">
                    <button class="btn btn-secondary" onclick="closeModal('linkKidModal')">取消</button>
                    <button class="btn btn-primary" onclick="confirmLinkKid()">确认关联</button>
                </div>
            </div>
            <div id="linkKidHint" style="display: none;">
                <p style="font-size: 12px; color: #999; margin-bottom: 15px;">请向添加小朋友的家长获取关联码</p>
                <div class="btn-group">
                    <button class="btn btn-secondary" onclick="closeModal('linkKidModal')">取消</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 积分操作弹窗 -->
    <div class="modal" id="pointsModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="pointsModalTitle">积分操作</div>
                <button class="close-btn" onclick="closeModal('pointsModal')">×</button>
            </div>
            <div class="form-group">
                <label class="form-label">家长姓名</label>
                <input type="text" class="form-input" id="parentName" placeholder="请输入您的姓名" value="">
            </div>
            <div class="form-group">
                <label class="form-label">积分数量</label>
                <input type="number" class="form-input" id="pointsAmount" value="1" min="1">
            </div>
            <div class="quick-points" id="quickPointsBtns">
                <!-- 快捷积分按钮 -->
            </div>
            <div class="form-group">
                <label class="form-label">原因</label>
                <input type="text" class="form-input" id="pointsReason" placeholder="请输入原因（选填）">
            </div>
            <div class="btn-group">
                <button class="btn btn-secondary" onclick="closeModal('pointsModal')">取消</button>
                <button class="btn btn-primary" id="pointsConfirmBtn">确认</button>
            </div>
        </div>
    </div>

    <!-- 历史记录弹窗 -->
    <div class="modal" id="historyModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">历史记录</div>
                <button class="close-btn" onclick="closeModal('historyModal')">×</button>
            </div>
            <ul class="history-list" id="historyList">
                <!-- 历史记录将在这里渲染 -->
            </ul>
        </div>
    </div>

    <!-- 删除确认弹窗 -->
    <div class="modal" id="deleteKidModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">确认删除</div>
                <button class="close-btn" onclick="closeModal('deleteKidModal')">×</button>
            </div>
            <div style="padding: 20px; text-align: center;">
                <p style="margin-bottom: 20px; font-size: 16px;">确定要删除 <strong id="deleteKidName" style="color: #e74c3c;"></strong> 吗？</p>
                <p style="color: #999; font-size: 14px; margin-bottom: 20px;">此操作不可恢复，所有积分历史将被删除</p>
                <button class="btn btn-danger" style="width: 100%; margin-bottom: 10px;" onclick="deleteKid()">确认删除</button>
                <button class="btn" style="width: 100%;" onclick="closeModal('deleteKidModal')">取消</button>
            </div>
        </div>
    </div>

        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Supabase 配置
        const SUPABASE_URL = 'https://jjapnufndavlbtmqyufn.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpqYXBudWZuZGF2bGJ0bXF5dWZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5NDk3OTMsImV4cCI6MjA4ODUyNTc5M30.yXciuHKpUe2PumtLCDGiCf-SepQqoHBTmPloXizwpbI';

        // 使用 window.supabase 全局对象创建客户端

        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let currentUser = null;
        let currentKidId = null;
        let currentAction = null;

        // 初始化
        async function init() {
            console.log('应用初始化...');
            // 直接显示登录界面，让用户输入昵称
            showLogin();
        }

        // 匿名登录
        async function anonymousLogin() {
            const nickname = document.getElementById('nicknameInput').value.trim();

            if (!nickname) {
                alert('请输入昵称');
                return;
            }

        // 排名缓存
        let rankingCache = {
            data: null,
            timestamp: 0,
            parentId: null
        };
        const CACHE_EXPIRE_MS = 30000; // 缓存30秒

        // 加载积分排名
        async function loadRanking(forceRefresh = false) {
            const rankingList = document.getElementById('rankingList');
            const rankingEmpty = document.getElementById('rankingEmpty');
            
            // 显示 loading
            rankingList.innerHTML = '<div class="loading">加载中...</div>';
            rankingEmpty.style.display = 'none';

            try {
                const parentId = currentUser.nickname;
                const now = Date.now();

                // 检查缓存是否有效（30秒内，且 parentId 相同）
                if (!forceRefresh && 
                    rankingCache.data && 
                    rankingCache.parentId === parentId &&
                    (now - rankingCache.timestamp) < CACHE_EXPIRE_MS) {
                    console.log('使用缓存的排名数据');
                    renderRanking(rankingCache.data);
                    return;
                }

                console.log('开始查询排名数据，parentId:', parentId);

                // 查询自己创建的和自己关联的小朋友
                // parent_id 包含当前用户（模糊匹配），或者 creator_id 是当前用户
                const { data, error } = await db
                    .from('kids')
                    .select('id, name, total_points')
                    .or(`parent_id.like.*${parentId}%,creator_id.eq.${parentId}`)
                    .order('total_points', { ascending: false });

                console.log('排名查询结果:', data, error);

                if (error) {
                    rankingList.innerHTML = '';
                    console.error('加载排名失败:', error);
                    alert('加载排名失败: ' + error.message);
                    return;
                }

                if (!data || data.length === 0) {
                    rankingList.innerHTML = '';
                    rankingEmpty.style.display = 'block';
                    return;
                }

                // 更新缓存
                rankingCache = {
                    data: data,
                    timestamp: now,
                    parentId: parentId
                };

                renderRanking(data);
            } catch (err) {
                rankingList.innerHTML = '';
                console.error('加载排名异常:', err);
                alert('加载排名失败: ' + err.message);
            }
        }

                return `
                    <div class="ranking-item">

        // 添加小朋友
        async function addKid() {
            const name = document.getElementById('kidName').value.trim();
            const initialPoints = parseInt(document.getElementById('initialPoints').value) || 0;
            const kidCode = document.getElementById('kidCode').value.trim();

            if (!name) {
                alert('请输入小朋友的名字');
                return;
            }

            // 验证关联码
            if (kidCode && (kidCode.length !== 6 || !/^\d{6}$/.test(kidCode))) {
                alert('关联码必须是6位数字');
                return;
            }

            const parentId = currentUser.nickname;
            console.log('当前用户:', currentUser);
            console.log('使用的parentId:', parentId);

            try {
                console.log('开始添加数据:', { name, total_points: initialPoints, parent_id: parentId, kid_code: kidCode, creator_id: parentId });
                
                const { data, error } = await db
                    .from('kids')
                    .insert({
                        name: name,
                        total_points: initialPoints,
                        parent_id: parentId,
                        creator_id: parentId,
                        kid_code: kidCode || null
                    })
                    .select();

                        .from('point_history')

                        });

        // 确认关联
        async function confirmLinkKid() {
            const linkCode = document.getElementById('linkKidCode').value.trim();
            
            if (!linkCode) {
                alert('请输入关联码');
                return;
            }
            
            if (linkCode.length !== 6 || !/^\d{6}$/.test(linkCode)) {
                alert('关联码必须是6位数字');
                return;
            }
            
            if (!linkKidId) {
                alert('请先选择小朋友');
                return;
            }
            
            const parentId = currentUser.nickname;
            
            try {
                // 查找选择的小朋友并验证关联码
                const { data: kids, error: searchError } = await db
                    .from('kids')
                    .select('*')
                    .eq('id', linkKidId);
                
                if (searchError) {
                    alert('查询失败: ' + searchError.message);
                    return;
                }
                
                if (!kids || kids.length === 0) {
                    alert('未找到该小朋友');
                    return;
                }
                
                const kid = kids[0];
                
                // 验证关联码
                if (kid.kid_code !== linkCode) {
                    alert('关联码错误，请检查后重新输入');
                    return;
                }
                
                // 检查是否已经关联过
                const existingParents = kid.parent_id ? kid.parent_id.split(',') : [];
                if (existingParents.includes(parentId)) {
                    alert('您已经关联过该小朋友了');
                    return;
                }
                
                // 追加到家长列表（用逗号分隔）
                const newParentId = existingParents.length > 0 
                    ? kid.parent_id + ',' + parentId 
                    : parentId;
                
                const { error: updateError } = await db
                    .from('kids')
                    .update({ parent_id: newParentId })
                    .eq('id', kid.id);
                
                if (updateError) {
                    alert('关联失败: ' + updateError.message);
                    return;
                }
                
                closeModal('linkKidModal');
                document.getElementById('linkKidCode').value = '';
                document.getElementById('linkKidCodeSection').style.display = 'none';
                document.getElementById('linkKidHint').style.display = 'block';
                linkKidId = null;
                
                loadKids();
                alert('关联成功！现在您可以管理 ' + kid.name + ' 了');
                
            } catch (err) {
                console.error('关联失败:', err);
                alert('关联失败: ' + err.message);
            }
        }

            const kidName = document.querySelector(`button[onclick*="'${kidId}'"]`).closest('.kid-card').querySelector('.kid-name').textContent;

            };

        // 设置积分数量
        function setPointsAmount(amount) {
            document.getElementById('pointsAmount').value = amount;
        }

        // 确认积分操作
        async function confirmPoints() {
            const kidId = currentKidId;
            const parentName = document.getElementById('parentName').value.trim() || currentUser?.nickname || '家长';
            const points = parseInt(document.getElementById('pointsAmount').value) || 0;
            const reason = document.getElementById('pointsReason').value.trim();

            if (points <= 0) {
                alert('请输入有效的积分数量');
                return;
            }

            // 先查询当前积分
            console.log('查询小朋友数据，ID:', kidId);
            const { data: kids, error: queryError } = await db
                .from('kids')
                .select('*')
                .eq('id', kidId);
            
            console.log('查询结果:', kids, queryError);
            
            if (queryError || !kids || kids.length === 0) {
                alert('查询失败: ' + (queryError?.message || '未知错误'));
                return;
            }

            const kid = kids[0];

            // 兑换需要检查积分是否足够，扣分可以扣到负分
            if (currentAction === 'exchange' && points > kid.total_points) {
                alert('积分不足');
                return;
            }

            let pointChange = 0;
            let type = '';
            let actionText = '';

            if (currentAction === 'add') {
                pointChange = points;
                type = 'add';
                actionText = '加分';
            } else if (currentAction === 'subtract') {
                pointChange = -points;
                type = 'subtract';
                actionText = '减分';
            } else if (currentAction === 'exchange') {
                pointChange = -points;
                type = 'exchange';
                actionText = '兑换';
            }

            const newTotalPoints = kid.total_points + pointChange;

            try {
                console.log('更新数据:', { total_points: newTotalPoints });
                
                // 更新积分
                const { error: updateError } = await db
                    .from('kids')
                    .update({
                        total_points: newTotalPoints
                    })
                    .eq('id', kidId);

                console.log('更新结果:', updateError);

                if (updateError) {
                    alert('操作失败: ' + updateError.message);
                    return;
                }

                // 写入历史记录表
                console.log('准备写入历史记录:', {
                    kid_id: kidId,
                    kid_id_type: typeof kidId,
                    type: type,
                    points: currentAction === 'add' ? points : -points,
                    reason: reason || actionText,
                    parent_name: parentName
                });
                
                const { error: historyError } = await db
                    .from('point_history')
                    .insert({
                        kid_id: kidId,
                        type: type,
                        points: currentAction === 'add' ? points : -points,
                        reason: reason || actionText,
                        parent_name: parentName
                    });

                if (historyError) {
                    console.error('写入历史记录失败:', historyError);
                } else {
                    console.log('历史记录写入成功');
                }

                closeModal('pointsModal');
                loadKids();

                // 如果当前在排名页，也刷新排名（强制刷新缓存）
                if (document.getElementById('tabRanking').classList.contains('active')) {
                    loadRanking(true);
                }

                const message = type === 'add'
                    ? `已给 ${kid.name} 加 ${points} 分!`
                    : `已${actionText} ${points} 分!`;
                alert(message);
            } catch (err) {
                console.error('操作失败:', err);
                alert('操作失败: ' + err.message);
            }
        }

        // 删除小朋友
        async function deleteKid() {
            if (!kidToDeleteId) {
                alert('删除失败：未找到要删除的小朋友');
                return;
            }

            const parentId = currentUser.nickname;

            try {
                // 先查询小朋友的创建者
                const { data: kids, error: queryError } = await db
                    .from('kids')
                    .select('*')
                    .eq('id', kidToDeleteId);

                if (queryError || !kids || kids.length === 0) {
                    alert('查询失败');
                    return;
                }

                const kid = kids[0];

                // 检查是否是创建者
                if (kid.creator_id !== parentId) {
                    alert('只有创建者才能删除小朋友');
                    return;
                }

                // 执行删除
                const { error: deleteError } = await db
                    .from('kids')
                    .delete()
                    .eq('id', kidToDeleteId);

                if (deleteError) {
                    alert('删除失败: ' + deleteError.message);
                    return;
                }

                closeModal('deleteKidModal');
                loadKids();

                // 如果当前在排名页，也刷新排名（强制刷新缓存）
                if (document.getElementById('tabRanking').classList.contains('active')) {
                    loadRanking(true);
                }

                alert('删除成功');
                kidToDeleteId = null;
            } catch (err) {
                console.error('删除失败:', err);
                alert('删除失败: ' + err.message);
            }
        }

        // 打开历史记录弹窗
        async function openHistoryModal(kidId) {
            // 从历史记录表读取数据
            const { data: historyRecords, error } = await db
                .from('point_history')
                .select('*')
                .eq('kid_id', kidId)
                .order('created_at', { ascending: false });
                
            if (error) {
                alert('查询失败: ' + error.message);
                return;
            }

            const historyList = document.getElementById('historyList');

            if (!historyRecords || historyRecords.length === 0) {
                historyList.innerHTML = '<li style="text-align: center; padding: 20px; color: #999;">暂无历史记录</li>';
            } else {
                historyList.innerHTML = historyRecords.map(record => {
                    const typeLabels = {
                        add: { text: '加分', className: 'add' },
                        subtract: { text: '减分', className: 'subtract' },
                        exchange: { text: '兑换', className: 'exchange' }
                    };
                    const typeInfo = typeLabels[record.type];
                    const pointSign = record.type === 'add' ? '+' : '-';

                    return `
                        <li class="history-item">
                            <div class="history-info">
                                <div class="history-action">${escapeHtml(record.parent_name || '')} - ${typeInfo.text}</div>
                                <div class="history-reason">${escapeHtml(record.reason || '')}</div>
                                <div class="history-time">${record.created_at ? new Date(record.created_at).toLocaleString('zh-CN') : ''}</div>
                            </div>
                            <div class="history-points ${typeInfo.className}">${pointSign}${Math.abs(record.points)}</div>
                        </li>
                    `;
                }).join('');
            }

            document.getElementById('historyModal').classList.add('active');
        }

        }

        // 转义HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 点击遮罩层关闭弹窗
        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.classList.remove('active');
                }
            });
        });

        // 初始化
        init();
    </script>
</body>
</html>
